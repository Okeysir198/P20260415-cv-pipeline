# RT-DETRv2-R50 on CPPE-5, via our in-repo pipeline + HF Trainer backend
# + torchvision v2 CPU augmentation (NOT Albumentations).
#
# Companion to our_rtdetr_v2_albumentations/06_training.yaml — the ONLY
# semantic difference is `augmentation.library: torchvision`. Same model,
# same hyperparams, same dataset. Used to measure torchvision v2 aug
# overhead vs the Albumentations fast path.
#
# Usage (from repo root):
#   CUDA_VISIBLE_DEVICES=1 uv run core/p06_training/train.py \
#     --config notebooks/detr_finetune_reference/our_rtdetr_v2_torchvision/06_training.yaml
#
# All artefacts land in
#   notebooks/detr_finetune_reference/our_rtdetr_v2_torchvision/runs/seed42/
# (HF-Trainer-standard: checkpoint-*/, runs/<ts>_<host>/ tensorboard, trainer_state.json)

model:
  arch: rtdetr-r50
  pretrained: PekingU/rtdetr_v2_r50vd
  num_classes: 5
  input_size: [480, 480]

data:
  dataset_config: 05_data.yaml
  batch_size: 16
  num_workers: 2
  prefetch_factor: 2
  pin_memory: true
  subset:
    train: null
    val: null
    test: null

augmentation:
  library: torchvision           # the slow path — what we're benchmarking
  normalize: false
  mosaic: false
  mixup: false
  # Same probability-gated transforms as the albumentations variant —
  # `build_transforms` honours these in both backends.
  perspective_p: 0.1
  fliplr: 0.5
  brightness_contrast_p: 0.5
  hsv_p: 0.1
  scale: [1.0, 1.0]
  degrees: 0.0
  translate: 0.0
  shear: 0.0

training:
  backend: hf
  epochs: 40
  optimizer: adamw
  lr: 0.0001
  weight_decay: 0.0001
  warmup_steps: 300
  scheduler: cosine
  max_grad_norm: 0.1
  bf16: true
  amp: false
  gpu_augment: false
  ema: false

  val_viz:
    enabled: true
    num_samples: 8
    conf_threshold: 0.05
    grid_cols: 2
  train_viz:
    enabled: false
  data_viz:
    enabled: true
    splits: [train, val, test]
    num_samples: 16
    grid_cols: 4
  aug_viz:
    enabled: true
    splits: [train]
    num_samples: 16
    grid_cols: 4

loss:
  type: detr

logging:
  wandb_project: smart-camera
  run_name: cppe5_our_torchvision
  save_dir: runs/seed42

checkpoint:
  save_best: true
  metric: eval_map
  mode: max
  save_interval: 1

seed: 42
