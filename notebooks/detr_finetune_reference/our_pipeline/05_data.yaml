# CPPE-5 as a "feature" for our in-repo pipeline.
# Dataset dumped by `data_loader.py::dump_cppe5_to_yolo()` into the usual
# dataset_store layout (850 train / 150 val / 29 test, qubvel seed=1337).
dataset_name: "cppe5"
path: "../../../dataset_store/training_ready/cppe5"
train: "train/images"
val: "val/images"
test: "test/images"

names:
  0: Coverall
  1: Face_Shield
  2: Gloves
  3: Goggles
  4: Mask
num_classes: 5

# Reference notebook uses 480; we match it here (our production fire_detection
# uses 640 for tiny fire/smoke objects — CPPE-5 is medium-object so 480 is fine
# and keeps us apples-to-apples with the reference).
input_size: [480, 480]

mean: [0.485, 0.456, 0.406]
std:  [0.229, 0.224, 0.225]

# Required by p02 annotation QA (empty — we're not running QA on CPPE-5)
auto_label:
  class_rules: []
