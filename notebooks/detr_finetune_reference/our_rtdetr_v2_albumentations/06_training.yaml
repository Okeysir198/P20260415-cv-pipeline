# RT-DETRv2-R50 on CPPE-5, via our in-repo pipeline + HF Trainer backend.
#
# Goal: prove `core/p06_training/train.py` + `core/p05_data/` (torchvision v2
# augments) + HF Trainer can reach test mAP comparable to the reference
# notebook's 0.5585 (same seed, same data, different trainer + aug library).
#
# Usage (from repo root):
#   CUDA_VISIBLE_DEVICES=1 .venv/bin/python core/p06_training/train.py \
#     --config notebooks/detr_finetune_reference/our_rtdetr_v2_albumentations/06_training.yaml
#
# All artefacts land in
#   notebooks/detr_finetune_reference/our_rtdetr_v2_albumentations/runs/<ts>_<step>/
# (HF-Trainer-standard: checkpoint-*/, runs/<ts>_<host>/ tensorboard, trainer_state.json)

model:
  arch: rtdetr-r50
  pretrained: PekingU/rtdetr_v2_r50vd
  num_classes: 5
  input_size: [480, 480]

data:
  dataset_config: 05_data.yaml
  batch_size: 16                 # reference Bundle B
  num_workers: 2                 # qubvel's dataloader_num_workers
  prefetch_factor: 2
  pin_memory: true
  subset:
    train: null
    val: null
    test: null

augmentation:
  library: albumentations        # ~2x faster than torchvision v2 for detection CPU aug;
                                 # matches qubvel's reference notebook pipeline exactly.
  normalize: false               # HF RTDetrV2ImageProcessor handles it; feed [0,1]
  mosaic: false                  # DETR family doesn't support mosaic
  mixup: false
  # Probability-gated transforms matching qubvel's reference Albumentations
  # pipeline. `build_transforms` defaults the magnitudes to qubvel-ish values
  # when only the `_p` gate is set, so we just specify the probabilities here:
  #   A.Perspective(p=0.1)              → perspective_p=0.1   (distortion 0.2)
  #   A.HorizontalFlip(p=0.5)           → fliplr=0.5
  #   A.RandomBrightnessContrast(p=0.5) → brightness_contrast_p=0.5  (brightness 0.2, contrast 0.2)
  #   A.HueSaturationValue(p=0.1)       → hsv_p=0.1           (hsv_h 0.015, hsv_s 0.2, hsv_v 0.1)
  perspective_p: 0.1
  fliplr: 0.5
  brightness_contrast_p: 0.5
  hsv_p: 0.1
  # Affine — qubvel's notebook doesn't use any affine. Pin to no-op so our
  # RandomAffine (always applied by default) is identity.
  scale: [1.0, 1.0]
  degrees: 0.0
  translate: 0.0
  shear: 0.0

training:
  backend: hf                    # route through core/p06_training/hf_trainer.py
  epochs: 40
  optimizer: adamw
  lr: 0.0001                     # reference
  weight_decay: 0.0001           # reference
  warmup_steps: 300              # qubvel pins steps (not epochs)
  scheduler: cosine
  max_grad_norm: 0.1             # reference
  bf16: true                     # RTX 5090 tensor cores
  amp: false                     # (we explicitly use bf16, not fp16 AMP)
  gpu_augment: false             # HF Trainer reads from dataset's collate_fn output
  ema: false                     # reference doesn't use EMA

  # Viz callbacks — ported to HF Trainer via `_HFVizBridge` in hf_trainer.py.
  # Leave on; they each produce a few hundred KB of PNGs under the run dir.
  val_viz:
    enabled: true
    num_samples: 8
    conf_threshold: 0.05
    grid_cols: 2
  train_viz:
    enabled: false              # skip per-epoch train preds (val is enough)
  data_viz:
    enabled: true
    splits: [train, val, test]
    num_samples: 16
    grid_cols: 4
  aug_viz:
    enabled: true
    splits: [train]
    num_samples: 16
    grid_cols: 4

loss:
  type: detr

logging:
  wandb_project: smart-camera
  run_name: cppe5_our_albumentations
  # Pin save_dir so this config stays self-contained under
  # notebooks/detr_finetune_reference/our_rtdetr_v2_albumentations/. Without
  # this, `generate_run_dir` falls back to `features/<run_name>/runs/...`
  # (a ghost feature folder) because the config lives outside `features/`.
  # Path is resolved relative to this config file. HF Trainer puts its usual
  # `checkpoint-N/` + tensorboard `runs/` + `trainer_state.json` inside.
  save_dir: runs/seed42

checkpoint:
  save_best: true
  metric: eval_map               # HF Trainer convention (torchmetrics "map")
  mode: max
  save_interval: 1               # save every epoch; HF Trainer prunes via save_total_limit

seed: 42
