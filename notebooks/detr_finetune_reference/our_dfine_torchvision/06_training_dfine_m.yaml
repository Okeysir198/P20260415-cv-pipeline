# D-FINE-M on CPPE-5, via our in-repo pipeline + HF Trainer backend
# + torchvision v2 CPU augmentation.
# Same recipe as 06_training.yaml (dfine-n baseline) — only arch and pretrained differ.
# Purpose: compare dfine-n vs dfine-s vs dfine-m capacity on CPPE-5 (850 train images).
#
# Usage (from repo root):
#   CUDA_VISIBLE_DEVICES=1 uv run core/p06_training/train.py \
#     --config notebooks/detr_finetune_reference/our_dfine_torchvision/06_training_dfine_m.yaml
#
# Artefacts land in
#   notebooks/detr_finetune_reference/our_dfine_torchvision/runs/seed42_dfine_m/

model:
  arch: dfine-m                  # ~31M params
  pretrained: ustc-community/dfine_m_coco
  num_classes: 5
  input_size: [480, 480]

tensor_prep:
  input_size: [480, 480]
  rescale: true
  normalize: false
  mean: [0.485, 0.456, 0.406]
  std:  [0.229, 0.224, 0.225]
  applied_by: hf_processor

data:
  dataset_config: 05_data.yaml
  batch_size: 8
  num_workers: 2
  prefetch_factor: 2
  pin_memory: true
  subset:
    train: null
    val: null
    test: null

augmentation:
  library: torchvision
  normalize: false               # HF DFineImageProcessor handles it; feed [0,1]
  mosaic: false
  mixup: false
  perspective_p: 0.1
  fliplr: 0.5
  brightness_contrast_p: 0.5
  hsv_p: 0.1
  scale: [1.0, 1.0]
  degrees: 0.0
  translate: 0.0
  shear: 0.0

training:
  backend: hf
  epochs: 30
  optimizer: adamw
  lr: 0.00005
  weight_decay: 0.0
  warmup_steps: 300
  scheduler: linear
  max_grad_norm: 0.1
  bf16: false
  amp: false
  gpu_augment: false
  ema: false                     # reference doesn't use EMA
  patience: 8

  val_viz:
    enabled: true
    num_samples: 16
    conf_threshold: 0.01
    grid_cols: 2
  train_viz:
    enabled: false
  data_viz:
    enabled: true
    splits: [train, val, test]
    num_samples: 16
    grid_cols: 4
  aug_viz:
    enabled: true
    splits: [train]
    num_samples: 16
    grid_cols: 4
  best_viz:
    enabled: true
    num_samples: 16
    conf_threshold: 0.01

loss:
  type: detr

logging:
  save_dir: runs/seed42_dfine_m
  report_to: none

checkpoint:
  save_best: true
  metric: eval_map
  mode: max
  save_interval: 1

evaluation:
  score_threshold: 0.0

seed: 42
