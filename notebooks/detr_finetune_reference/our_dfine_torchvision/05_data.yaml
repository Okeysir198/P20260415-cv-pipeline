# CPPE-5 as a "feature" for our in-repo pipeline — shared with
# our_rtdetr_v2_albumentations/ (same dataset, same seed=1337 split).
# Dumped by `data_loader.py::dump_cppe5_to_yolo()` into dataset_store.
dataset_name: "cppe5"
path: "../../../dataset_store/training_ready/cppe5"
train: "train/images"
val: "val/images"
test: "test/images"

names:
  0: Coverall
  1: Face_Shield
  2: Gloves
  3: Goggles
  4: Mask
num_classes: 5

# Reference notebook (DFine_finetune_on_a_custom_dataset.ipynb) uses 480;
# we match byte-for-byte with reference_dfine/finetune.py.
input_size: [480, 480]

mean: [0.485, 0.456, 0.406]
std:  [0.229, 0.224, 0.225]

# Required by p02 annotation QA (empty — not running QA on CPPE-5)
auto_label:
  class_rules: []
