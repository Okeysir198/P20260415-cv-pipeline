# D-FINE-large on CPPE-5, via our in-repo pipeline + HF Trainer backend.
#
# Goal: reproduce reference_dfine/finetune.py's test mAP ≈ 0.4294 (seed=42),
# which itself reproduces qubvel's published 0.4485 within seed-variance.
# Same data (seed=1337 split), same model, same hyperparameters — the only
# difference is the training loop (qubvel's notebook Trainer vs our
# `core/p06_training/train.py --backend hf`).
#
# Usage (from repo root):
#   CUDA_VISIBLE_DEVICES=1 uv run core/p06_training/train.py \
#     --config notebooks/detr_finetune_reference/our_dfine_albumentations/06_training.yaml
#
# Artefacts land in
#   notebooks/detr_finetune_reference/our_dfine_albumentations/runs/seed42/
# (HF-Trainer-standard: checkpoint-N/, runs/<ts>_<host>/ TB, trainer_state.json,
#  test_results.json)

model:
  arch: dfine-large
  pretrained: ustc-community/dfine-large-coco
  num_classes: 5
  input_size: [480, 480]

data:
  dataset_config: 05_data.yaml
  batch_size: 8                  # qubvel's per_device_train_batch_size
  num_workers: 2                 # qubvel's dataloader_num_workers
  prefetch_factor: 2
  pin_memory: true
  subset:
    train: null
    val: null
    test: null

augmentation:
  library: albumentations        # matches qubvel's reference notebook pipeline
  normalize: false               # HF DFineImageProcessor handles it; feed [0,1]
  mosaic: false                  # DETR family doesn't support mosaic
  mixup: false
  # Qubvel's reference Albumentations pipeline:
  #   A.Perspective(p=0.1)
  #   A.HorizontalFlip(p=0.5)
  #   A.RandomBrightnessContrast(p=0.5)
  #   A.HueSaturationValue(p=0.1)
  perspective_p: 0.1
  fliplr: 0.5
  brightness_contrast_p: 0.5
  hsv_p: 0.1
  # Affine — qubvel doesn't use any. Pin to no-op.
  scale: [1.0, 1.0]
  degrees: 0.0
  translate: 0.0
  shear: 0.0

training:
  backend: hf
  epochs: 30                     # qubvel's num_train_epochs
  optimizer: adamw
  lr: 0.00005                    # qubvel's learning_rate=5e-5
  weight_decay: 0.0              # qubvel's default (not set)
  warmup_steps: 300              # qubvel's warmup_steps
  scheduler: linear              # qubvel's default (not set)
  max_grad_norm: 0.1             # qubvel's max_grad_norm
  bf16: false                    # matches reference_dfine exactly. An earlier
                                 # run with bf16=true stalled val mAP at 0.155
                                 # through ep11 — D-FINE's distribution-focused
                                 # loss appears more bf16-sensitive than
                                 # RT-DETRv2's vanilla regression.
  amp: false                     # D-FINE decoder overflows in fp16
  gpu_augment: false             # HF Trainer uses its own DataLoader
  ema: false                     # reference doesn't use EMA

  val_viz:
    enabled: true
    num_samples: 8
    conf_threshold: 0.05
    grid_cols: 2
  train_viz:
    enabled: false
  data_viz:
    enabled: true
    splits: [train, val, test]
    num_samples: 16
    grid_cols: 4
  aug_viz:
    enabled: true
    splits: [train]
    num_samples: 16
    grid_cols: 4

loss:
  type: detr

logging:
  run_name: cppe5_our_dfine_albumentations_fp32
  save_dir: runs/seed42
  report_to: tensorboard

checkpoint:
  save_best: true
  metric: eval_map
  mode: max
  save_interval: 1

seed: 42
