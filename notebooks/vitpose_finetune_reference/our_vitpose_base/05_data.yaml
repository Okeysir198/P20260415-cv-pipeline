# COCO-keypoints as a "feature" for our in-repo pipeline.
#
# Dumped layout (produced by a separate data_loader unit, not this config):
#   dataset_store/training_ready/coco_keypoints/
#     train/{images/,labels/}
#     val/{images/,labels/}
# Labels are YOLO-pose format `.txt`:
#   class_id cx cy w h kx1 ky1 v1 ... kx17 ky17 v17    (normalized 0-1)
# This matches `core/p05_data/keypoint_dataset.py::KeypointDataset`.
#
# Class list: only `person` (class 0) — COCO-keypoints is single-class.
task: keypoint

dataset_name: "coco_keypoints"
path: "../../../dataset_store/training_ready/coco_keypoints"
train: "train"
val: "val"
# COCO-keypoints provides no separate test split — mirror val (same as
# segformer reference's sidewalk-semantic mirror).
test: "val"

names:
  0: person
num_classes: 1

# 17 COCO keypoints in canonical order. `flip_indices` is the L↔R swap
# permutation used by KeypointTransform when fliplr triggers.
num_keypoints: 17
keypoint_names:
  - nose
  - left_eye
  - right_eye
  - left_ear
  - right_ear
  - left_shoulder
  - right_shoulder
  - left_elbow
  - right_elbow
  - left_wrist
  - right_wrist
  - left_hip
  - right_hip
  - left_knee
  - right_knee
  - left_ankle
  - right_ankle
flip_indices: [0, 2, 1, 4, 3, 6, 5, 8, 7, 10, 9, 12, 11, 14, 13, 16, 15]

# COCO keypoint sigmas for OKS metric (per pycocotools).
oks_sigmas: [0.026, 0.025, 0.025, 0.035, 0.035, 0.079, 0.079, 0.072, 0.072,
             0.062, 0.062, 0.107, 0.107, 0.087, 0.087, 0.089, 0.089]

# Skeleton edges (0-indexed pairs over `keypoint_names`). Used by viz
# helpers to draw connecting lines between joints. Mirrors the canonical
# COCO 17-keypoint skeleton (the same edge set pycocotools ships).
skeleton:
  - [15, 13]   # left_ankle  -> left_knee
  - [13, 11]   # left_knee   -> left_hip
  - [16, 14]   # right_ankle -> right_knee
  - [14, 12]   # right_knee  -> right_hip
  - [11, 12]   # left_hip    -> right_hip
  - [ 5, 11]   # left_shoulder  -> left_hip
  - [ 6, 12]   # right_shoulder -> right_hip
  - [ 5,  6]   # left_shoulder  -> right_shoulder
  - [ 5,  7]   # left_shoulder  -> left_elbow
  - [ 6,  8]   # right_shoulder -> right_elbow
  - [ 7,  9]   # left_elbow  -> left_wrist
  - [ 8, 10]   # right_elbow -> right_wrist
  - [ 1,  2]   # left_eye    -> right_eye
  - [ 0,  1]   # nose        -> left_eye
  - [ 0,  2]   # nose        -> right_eye
  - [ 1,  3]   # left_eye    -> left_ear
  - [ 2,  4]   # right_eye   -> right_ear
  - [ 3,  5]   # left_ear    -> left_shoulder
  - [ 4,  6]   # right_ear   -> right_shoulder

# ViTPose default — non-square H×W. (height, width).
input_size: [256, 192]

# ImageNet normalization (ViTPose processor default).
mean: [0.485, 0.456, 0.406]
std:  [0.229, 0.224, 0.225]

# Required by p02 annotation QA (empty — no QA on coco_keypoints).
auto_label:
  class_rules: []
