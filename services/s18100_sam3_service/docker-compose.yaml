services:
  sam3:
    build: .
    env_file:
      - .env
    ports:
      - "18100:18100"
    volumes:
      - model-cache:/app/.cache/huggingface
      - ./configs:/app/configs
      - ./src:/app/src  # Dev mode: mount source code to test without rebuild
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:18100/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3

  demo:
    build: .
    env_file:
      - .env
    ports:
      - "7860:7860"
    volumes:
      - model-cache:/app/.cache/huggingface
      - ./configs:/app/configs
      - ./src:/app/src
      - ./demo.py:/app/demo.py
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: ["uv", "run", "--extra", "demo", "python", "demo.py", "--server-name", "0.0.0.0", "--server-port", "7860"]
    profiles:
      - demo

volumes:
  model-cache:
