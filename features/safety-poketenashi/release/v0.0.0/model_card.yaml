# Model Card Template
# Auto-generated by: uv run python utils/release.py --run-dir <run_dir>
# Real release dirs are named v{N}_{YYYY-MM-DD} (e.g. v1_2026-04-14).

model:
  use_case: safety-poketenashi             # Use case name (e.g. safety-fire_detection, ppe-helmet_detection)
  version: 1                           # Auto-incremented or explicit via --version
  released: "YYYY-MM-DD"               # Release date
  notes: ""                            # Free-text release notes (--notes flag)

dataset:
  dvc_tag: <use_case>-data-v1          # DVC tag for exact dataset version
                                       # "untagged" if no DVC tag found

source:
  training_run: ""                     # Path to the training run directory
  onnx_source: ""                      # Path to exported ONNX file (if any)

architecture:
  arch: ""                             # Model architecture (yolox-m, dfine-s, rtdetr-r18, ...)
  num_classes: 0                       # Number of detection classes
  input_size: []                       # Model input resolution [H, W]

metrics: {}                            # Populated from run_dir/metrics.json
                                       # Typical keys: mAP50, mAP50_95, precision, recall, per_class
