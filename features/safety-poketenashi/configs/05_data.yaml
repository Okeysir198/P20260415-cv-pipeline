# Dataset config — Poketenashi (umbrella: prohibited + required action suite)
#
# This is the umbrella inference config for the full poketenashi system.
# It lists all behaviors the system can detect/flag, whether via:
#   - ML detection model (phone_usage → safety-poketenashi-phone-usage sub-model)
#   - Pose-based rules on RTMPose keypoints (all other behaviors)
#   - Zone + tracking logic (stair_diagonal)
#
# Prohibited actions (❌ alert when detected):
#   phone_usage          — using mobile phone while walking
#   hands_in_pockets     — walking with hands in pockets
#   stair_diagonal       — crossing stairs diagonally / taking shortcuts
#
# Required actions (❌ alert when NOT observed in window):
#   no_handrail          — not holding handrail on stairs
#   no_pointing_calling  — not performing pointing-and-calling at checkpoint

dataset_name: "safety_poketenashi"
path: "../../../dataset_store/training_ready/safety_poketenashi_phone_usage"
train: "train/images"
val: "val/images"
test: "test/images"

# Detection output space for the full orchestrated system
names:
  0: person
  1: phone_usage
  2: hands_in_pockets
  3: stair_diagonal
  4: no_handrail
  5: no_pointing_calling
num_classes: 6
input_size: [640, 640]

# Normalization (phone-usage sub-model; pose models use their own)
mean: [0.485, 0.456, 0.406]
std: [0.229, 0.224, 0.225]

# Sub-model configs (loaded by the poketenashi inference orchestrator)
sub_models:
  phone_detection:
    data_config: features/safety-poketenashi-phone-usage/configs/05_data.yaml
    training_config: features/safety-poketenashi-phone-usage/configs/06_training.yaml
  pose_estimation:
    config: features/safety-fall_pose_estimation/configs/05_data.yaml
