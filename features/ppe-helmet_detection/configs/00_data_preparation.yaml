# Helmet Detection — Data Preparation Config (v1, 2026-04-15)
#
# Quality-first selection: 3 sources totaling ~55.5K imgs.
#   1. sh17_ppe — Pexels-sourced, paper-authored, genuine diversity (backbone)
#   2. shlokraval_ppe_yolov8 — only large source with NO-Hardhat negatives
#   3. roboflow_ppe_6class — MIT-licensed, cross-PPE context
#
# Excluded (v2 candidates): hardhat_vest_v3 (community-scraped near-duplicates),
# roboflow_hardhat, hard_hat_workers, rf_chemical_ppe_11class, rf_siabar_ppe,
# roboflow_vest_helmet_9k (flagged "spot-check"), sfchd (Baidu-only), shwd (21 imgs).
#
# head_with_nitto_hat — empty in v1; populate from site_collected/ when available.

task: detection
dataset_name: "helmet_detection"
output_dir: "../../../dataset_store/training_ready/helmet_detection"
output_format: "yolo"

# Canonical target classes
classes:
  - person
  - head_with_helmet
  - head_without_helmet
  - head_with_nitto_hat

sources:
  # Primary backbone — sh17 VOC labels, 8,099 imgs, 17-class human-audited
  # We use VOC format (has explicit class names); YOLO labels also present but index order is unclear
  - name: "sh17_ppe"
    path: "../../../dataset_store/raw/helmet_detection/sh17_ppe"
    format: "voc"
    voc_annotations_dir: "voc_labels"
    voc_images_dir: "images"
    has_splits: false
    class_map:
      "helmet": "head_with_helmet"
      "head": "head_without_helmet"
      "person": "person"
      # other sh17 classes (face, foot, gloves, etc.) are dropped for this model

  # Large negatives source — 44,002 imgs, 14-class incl. NO-Hardhat
  - name: "shlokraval_ppe_yolov8"
    path: "../../../dataset_store/raw/helmet_detection/shlokraval_ppe_yolov8"
    format: "yolo"
    has_splits: true
    splits_to_use: ["train", "valid", "test"]
    class_map:
      "Hardhat": "head_with_helmet"
      "NO-Hardhat": "head_without_helmet"
      "Person": "person"
      # drop: Gloves/Goggles/Mask/Vest/Fall-Detected/Ladder/Safety Cone etc.

  # Bump cap (Nitto soft hat) — 664 imgs, 2-class Bump-cap / No BumpCap
  # Fills previously-empty head_with_nitto_hat class
  - name: "rf_bump_cap"
    path: "../../../dataset_store/raw/helmet_detection/rf_bump_cap"
    format: "yolo"
    has_splits: true
    splits_to_use: ["train", "valid", "test"]
    class_map:
      "Bump-cap": "head_with_nitto_hat"
      "No BumpCap": "head_without_helmet"

  # Cross-PPE context — 3,481 imgs, MIT
  - name: "roboflow_ppe_6class"
    path: "../../../dataset_store/raw/helmet_detection/roboflow_ppe_6class"
    format: "yolo"
    has_splits: true
    splits_to_use: ["train", "valid", "test"]
    class_map:
      "Helmet": "head_with_helmet"
      "Person": "person"
      # drop: Boots/Gloves/Goggles/Vest

  # Site-collected overlay — Nitto soft-hat samples populate here
  - name: "site_collected"
    path: "../../../dataset_store/site_collected/helmet_detection"
    format: "yolo"
    has_splits: false
    optional: true
    class_map:
      "head_with_helmet": "head_with_helmet"
      "head_without_helmet": "head_without_helmet"
      "head_with_nitto_hat": "head_with_nitto_hat"
      "person": "person"

splits:
  train: 0.8
  val: 0.1
  test: 0.1
  seed: 42

options:
  copy_images: true
  handle_duplicates: "rename"
  validate_labels: true
