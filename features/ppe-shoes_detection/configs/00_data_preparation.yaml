# Safety Shoes Detection — Data Preparation Config (v1, 2026-04-15)
#
# Quality-first selection: sources totaling ~37K imgs.
#   1. roboflow_ppe_6class — safety Boots + Person in same frames (MIT)
#   2. rf_chemical_ppe_11class — Shoes/NO-Shoes + Person all together
#   3. keremberke_ppe — COCO JSON with shoe/no_shoe annotations
#   4. rf_barefoot — dedicated barefoot negatives
#   5. rf_footwear_sandal_shoe — Sandal = non-compliant footwear
#   6. rf_safety_shoes_11k — big safety-shoes backbone (all positive)
#   7. rf_footwear_3class_mohamed — perfect taxonomy match incl. slippers
#   8. rf_footwear_9class — 9-class footwear, Boots→safety rest→non-safety
#   9. rf_safety_shoes_flipflop — safety_shoes vs FlipFlops
#  10. rf_sneakers — pure sneaker negatives
#
# Excluded (v2 candidates): rf_feet_segmentation (reserve for two-stage shoe_region
# pipeline), shoe_ppe (opaque class "14" — unusable).

task: detection
dataset_name: "shoes_detection"
output_dir: "../../../dataset_store/training_ready/shoes_detection"
output_format: "yolo"

# Canonical target classes
classes:
  - person
  - foot_with_safety_shoes
  - foot_without_safety_shoes

sources:
  # Safety-boots backbone — 3,481 imgs, MIT. Provides foot_with_safety_shoes + person.
  - name: "roboflow_ppe_6class"
    path: "../../../dataset_store/raw/helmet_detection/roboflow_ppe_6class"
    format: "yolo"
    has_splits: true
    splits_to_use: ["train", "valid", "test"]
    license: "MIT"
    notes: "Safety Boots + Person context, MIT license, 3,481 imgs"
    dropped_classes: ["Gloves", "Goggles", "Helmet", "Vest"]
    class_map:
      "Boots": "foot_with_safety_shoes"
      "Person": "person"

  # Chemical-context PPE — 1,180 imgs, has Shoes/NO-Shoes + Person all together
  - name: "rf_chemical_ppe_11class"
    path: "../../../dataset_store/raw/helmet_detection/rf_chemical_ppe_11class"
    format: "yolo"
    has_splits: true
    splits_to_use: ["train", "valid", "test"]
    license: "CC-BY-4.0"
    notes: "Shoes/NO-Shoes + Person in chemical context, 1,180 imgs"
    dropped_classes: ["Hardhat", "Gloves", "Goggles", "NO-Hardhat", "NO-Gloves", "NO-Goggles", "Vest", "NO-Vest"]
    class_map:
      "Shoes": "foot_with_safety_shoes"
      "No-Shoes": "foot_without_safety_shoes"
      "Person": "person"

  # Keremberke — COCO JSON, mostly glove/goggle labels but ~1,361 shoe/no_shoe anns overall
  - name: "keremberke_ppe"
    path: "../../../dataset_store/raw/shoes_detection/keremberke_ppe/data"
    format: "coco"
    has_splits: true
    splits_to_use: ["train", "valid", "test"]
    annotations_file: "_annotations.coco.json"
    license: "AGPL-3.0"
    notes: "COCO JSON multi-PPE — ~1,361 shoe/no_shoe annotations, AGPL license"
    dropped_classes: ["gloves", "goggles", "helmet", "vest"]
    class_map:
      "shoes": "foot_with_safety_shoes"
      "no_shoes": "foot_without_safety_shoes"

  # Barefoot negatives — 1,258 imgs, 1-class
  - name: "rf_barefoot"
    path: "../../../dataset_store/raw/shoes_detection/rf_barefoot"
    format: "yolo"
    has_splits: true
    splits_to_use: ["train", "valid", "test"]
    license: "CC-BY-4.0"
    notes: "Dedicated barefoot negatives for class balance, 1,258 imgs"
    class_map:
      "no_shoes": "foot_without_safety_shoes"

  # Sandal = non-compliant; Shoe class ambiguous → drop
  - name: "rf_footwear_sandal_shoe"
    path: "../../../dataset_store/raw/shoes_detection/rf_footwear_sandal_shoe"
    format: "yolo"
    has_splits: true
    splits_to_use: ["train", "valid", "test"]
    license: "CC-BY-4.0"
    notes: "Sandal → non-compliant footwear. Shoe and Unidentified dropped (ambiguous)"
    dropped_classes: ["Shoe", "Unidentified"]
    class_map:
      "Sandal": "foot_without_safety_shoes"

  # Big safety-shoes source — 19,976 imgs, 1-class (all positive)
  - name: "rf_safety_shoes_11k"
    path: "../../../dataset_store/raw/shoes_detection/rf_safety_shoes_11k"
    format: "yolo"
    has_splits: true
    splits_to_use: ["train", "valid", "test"]
    source_classes: ["safety_shoes"]
    license: "CC-BY-4.0"
    notes: "Largest safety-shoes source, all-positive (19,976 imgs)"
    class_map:
      "safety_shoes": "foot_with_safety_shoes"

  # 7,982 imgs, 3-class — perfect taxonomy match incl. slippers as negative
  - name: "rf_footwear_3class_mohamed"
    path: "../../../dataset_store/raw/shoes_detection/rf_footwear_3class_mohamed"
    format: "yolo"
    has_splits: true
    splits_to_use: ["train", "valid", "test"]
    license: "CC-BY-4.0"
    notes: "Perfect 3-class taxonomy: shoes/no_shoes/slippers, 7,982 imgs"
    class_map:
      "shoes": "foot_with_safety_shoes"
      "no_shoes": "foot_without_safety_shoes"
      "slippers": "foot_without_safety_shoes"

  # 4,695 imgs, 9-class footwear taxonomy — Boots→safety, others→non-safety
  - name: "rf_footwear_9class"
    path: "../../../dataset_store/raw/shoes_detection/rf_footwear_9class"
    format: "yolo"
    has_splits: true
    splits_to_use: ["train", "valid", "test"]
    license: "CC-BY-4.0"
    notes: "9-class footwear: Boots→safety, all others→non-safety (4,695 imgs)"
    class_map:
      "Boots": "foot_with_safety_shoes"
      "Sandals": "foot_without_safety_shoes"
      "Flip Flops": "foot_without_safety_shoes"
      "Sneakers": "foot_without_safety_shoes"
      "Dress_Shoes": "foot_without_safety_shoes"
      "Heels": "foot_without_safety_shoes"
      "Clogs": "foot_without_safety_shoes"
      "Flats": "foot_without_safety_shoes"
      "Mules": "foot_without_safety_shoes"

  # 3,405 imgs — safety_shoes vs FlipFlops
  - name: "rf_safety_shoes_flipflop"
    path: "../../../dataset_store/raw/shoes_detection/rf_safety_shoes_flipflop"
    format: "yolo"
    has_splits: true
    splits_to_use: ["train", "valid", "test"]
    license: "CC-BY-4.0"
    notes: "Safety shoes vs FlipFlops binary (3,405 imgs)"
    dropped_classes: ["0"]
    class_map:
      "safety_shoes_Detection  v3 20231011 213pm": "foot_with_safety_shoes"
      "FlipFlops": "foot_without_safety_shoes"
      "shoe": "foot_without_safety_shoes"

  # Pure sneaker negatives — 1,630 imgs
  - name: "rf_sneakers"
    path: "../../../dataset_store/raw/shoes_detection/rf_sneakers"
    format: "yolo"
    has_splits: true
    splits_to_use: ["train", "valid", "test"]
    license: "CC-BY-4.0"
    notes: "Pure sneaker negatives for diversity (1,630 imgs)"
    class_map:
      "sneaker": "foot_without_safety_shoes"

  # Site-collected overlay — factory footwear + person labels (optional)
  - name: "site_collected"
    path: "../../../dataset_store/site_collected/shoes_detection"
    format: "yolo"
    has_splits: false
    optional: true
    license: "internal"
    notes: "Nitto factory footwear footage — populate for deployment domain adaptation"
    class_map:
      "person": "person"
      "foot_with_safety_shoes": "foot_with_safety_shoes"
      "foot_without_safety_shoes": "foot_without_safety_shoes"

splits:
  train: 0.8
  val: 0.1
  test: 0.1
  seed: 42

options:
  copy_images: true
  handle_duplicates: "rename"
  validate_labels: true

# Datasets intentionally excluded from v1 — add in v2 when needed
held_back:
  - name: "rf_feet_segmentation"
    reason: "Segmentation masks for foot region — reserve for two-stage shoe_region pipeline (17K imgs)"
    when: "When two-stage foot→shoe detection is enabled"
  - name: "shoe_ppe"
    reason: "Opaque class label '14' — unusable without class mapping"
    when: "If original dataset authors publish class definitions"
  - name: "sh17_ppe_boots"
    reason: "Boots labels in sh17 and rf_siabar_ppe — cross-use from helmet datasets for Boots diversity"
    when: "If foot_with_safety_shoes mAP needs a boost on boot-type footwear"
