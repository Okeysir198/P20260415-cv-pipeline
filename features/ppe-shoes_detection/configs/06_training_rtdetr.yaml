# Training config — PPE: Safety Shoes Compliance (RT-DETRv2, HF Trainer backend)
# License: Apache 2.0 (Baidu / Peking University)
#
# Variants (override via --override model.arch=<key>):
#   rtdetr-r18 / rtdetr-r50
#
# Usage:
#   uv run core/p06_training/train.py --config features/ppe-shoes_detection/configs/06_training_rtdetr.yaml

model:
  arch: rtdetr-r18
  pretrained: PekingU/rtdetr_v2_r18vd
  num_classes: 3
  input_size: [640, 640]

data:
  dataset_config: 05_data.yaml
  batch_size: 16
  num_workers: 4
  prefetch_factor: 4
  pin_memory: true
  subset:
    train: null
    val: null
    test: null

augmentation:
  library: albumentations
  normalize: false
  mosaic: false
  mixup: false

  perspective_p: 0.1
  fliplr: 0.5
  brightness_contrast_p: 0.5
  hsv_p: 0.1
  hsv_h: 0.015
  hsv_s: 0.5
  hsv_v: 0.4

  scale: [1.0, 1.0]
  degrees: 0.0
  translate: 0.0
  shear: 0.0

training:
  backend: hf
  epochs: 150
  optimizer: adamw
  lr: 0.0001
  weight_decay: 0.0001
  warmup_steps: 300
  scheduler: cosine
  max_grad_norm: 0.1
  bf16: true
  amp: false
  gpu_augment: false
  ema: false
  patience: 50

  val_viz:
    enabled: true
    num_samples: 8
    conf_threshold: 0.05
    grid_cols: 2
  train_viz:
    enabled: false
  data_viz:
    enabled: true
    splits: [train, val, test]
    num_samples: 16
    grid_cols: 4
  aug_viz:
    enabled: true
    splits: [train]
    num_samples: 16
    grid_cols: 4

loss:
  type: detr

logging:
  wandb_project: smart-camera
  run_name: shoes_rtdetr_r18_bundleB

checkpoint:
  save_best: true
  metric: eval_map
  mode: max
  save_interval: 10

seed: 42
