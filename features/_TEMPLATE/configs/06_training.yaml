# Training config — TODO replace class + hyperparam placeholders.
model:
  arch: yolox-m
  pretrained: ../../../pretrained/yolox_m.pth
  num_classes: 2
  input_size: [640, 640]
  depth: 0.67
  width: 0.75

data:
  dataset_config: 05_data.yaml
  batch_size: 16
  num_workers: 4
  pin_memory: true

augmentation:
  mosaic: true
  mixup: true
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  fliplr: 0.5
  flipud: 0.0
  scale: [0.1, 2.0]
  degrees: 10.0
  translate: 0.1
  shear: 2.0

training:
  backend: pytorch
  epochs: 100
  optimizer: adamw
  lr: 0.01
  weight_decay: 0.0005
  warmup_epochs: 5
  scheduler: cosine
  patience: 20
  amp: true
  grad_clip: 35.0
  ema: true
  ema_decay: 0.9998

loss:
  type: yolox

logging:
  wandb_project: cv-pipeline
  run_name: <dataset_name>_v1

checkpoint:
  save_best: true
  metric: val/mAP50
  mode: max
  save_interval: 10

seed: 42
