# Face recognition pipeline config
pipeline: insightface  # "insightface" or "opencv_dnn"

insightface:
  model_pack: "../../../pretrained/access-face_recognition/buffalo_l.zip"
  det_size: [640, 640]
  det_thresh: 0.5

opencv_dnn:  # Apache-2.0 fallback
  detector: "../../../pretrained/access-face_recognition/yunet_2023mar_int8.onnx"
  recognizer: "../../../pretrained/access-face_recognition/sface_2021dec_int8.onnx"

gallery_path: "../eval/gallery.npz"
similarity_threshold: 0.5
unknown_label: "unknown"

anti_spoof:
  enabled: false
  model: "../../../pretrained/access-face_recognition/anti_spoof_2_7_80x80_MiniFASNetV2.pth"
  threshold: 0.6
