# Dataset config — Poketenashi: Phone Usage Detection
dataset_name: "safety_poketenashi_phone_usage"
path: "../../../dataset_store/training_ready/safety_poketenashi_phone_usage"
train: "train/images"
val: "val/images"
test: "test/images"

names:
  0: person
  1: phone_usage
num_classes: 2
input_size: [640, 640]

# Normalization (ImageNet defaults, updated by compute_normalization.py)
mean: [0.485, 0.456, 0.406]
std: [0.229, 0.224, 0.225]

# SAM3-friendly text prompts for auto-annotation
text_prompts:
  person: "a person standing, walking, or sitting"
  phone_usage: "a person holding a mobile phone to their ear or in front of their face, texting or calling on a smartphone"
