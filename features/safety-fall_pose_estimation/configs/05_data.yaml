# Dataset config — Fall Detection (Pose Approach)
dataset_name: "fall_pose_estimation"
path: "../../dataset_store/fall_pose_estimation"
train: "train/images"
val: "val/images"
test: "test/images"

names:
  0: person
num_classes: 1
input_size: [640, 640]

# Keypoint configuration (COCO 17-keypoint format)
kpt_shape: [17, 3]  # 17 keypoints, 3 values each (x, y, visibility)

# Normalization (ImageNet defaults, updated by compute_normalization.py)
mean: [0.485, 0.456, 0.406]
std: [0.229, 0.224, 0.225]
