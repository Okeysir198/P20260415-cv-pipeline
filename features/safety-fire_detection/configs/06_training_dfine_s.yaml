# Training config — Fire Detection (D-FINE, HF Trainer backend)
# License: Apache 2.0 (USTC / DEIM)
#
# Validated Phase-B result (2026-04-21, 20% train/val subset):
#   Peak val mAP@0.5 = 0.5677 @ ep39 (run 2026-04-21_201919_06_training)
#   Beats v1 (const_warmup, clip 0.1, 50 ep, killed @ ep43) which peaked 0.491.
#   Clearly beats v2 (cosine, clip 1.0, 40 ep) which peaked 0.328 @ ep10.
#
# Recipe is the official Peterande/D-FINE optimizer.yml (layered AdamW +
# constant_with_warmup + clip 0.1 + EMA 0.9999) adapted to HF Trainer via our
# `_DetectionTrainer.create_optimizer` backbone-vs-head param-group split.
# Reference notebook: notebooks/detr_finetune_reference/our_dfine_torchvision/
# (reproduces qubvel's D-FINE on CPPE-5, test mAP 0.492 at 50 ep seed=42).
#
# Why HF backend instead of pytorch (our earlier default):
#   Iteration 7 found D-FINE on the custom pytorch trainer collapses at small
#   N_classes (distribution-focused reg head unstable at startup with 2-query
#   reinit'd cls head; not hparam-fixable). HF backend + torchvision reproduces
#   the reference notebook and has been validated end-to-end on CPPE-5.
#
# Variants (override via --override model.arch=<key>):
#   dfine-n      — smallest, fastest inference (~4M params)
#   dfine-s      — 16M params                                  ← DEFAULT (best test mAP 0.648, 2026-05-02)
#   dfine-m      — 31M params, balanced accuracy-speed
#   dfine-large  — 102M params, highest accuracy
#
# Pretrained weights downloaded from HuggingFace Hub on first run:
#   ustc-community/dfine_s_coco, ustc-community/dfine_m_coco,
#   ustc-community/dfine-large-coco
#
# Usage:
#   uv run core/p06_training/train.py --config features/safety-fire_detection/configs/06_training_dfine_s.yaml
#   # 20% smoke:
#   uv run core/p06_training/train.py --config features/safety-fire_detection/configs/06_training_dfine_s.yaml \
#       --override data.subset.train=0.2 data.subset.val=0.2 training.epochs=30

model:
  arch: dfine-s
  pretrained: ustc-community/dfine_s_coco
  num_classes: 2
  input_size: [640, 640]     # fire/smoke objects are predominantly tiny (<1% of image);
                             # do NOT reduce below 640 — see feature CLAUDE.md "Data Findings"

# Explicit tensor_prep — suppresses auto-migration WARNING and matches RT-DETR pattern.
# DFineImageProcessor rescales /255 (rescale=true) but does NOT apply ImageNet
# mean/std (normalize=false) — fire dataset stats are off-distribution from ImageNet.
tensor_prep:
  input_size: [640, 640]
  rescale: true
  normalize: false             # do NOT apply ImageNet stats (off-distribution for fire)
  mean: [0.485, 0.456, 0.406]  # ignored when normalize=false
  std:  [0.229, 0.224, 0.225]
  applied_by: hf_processor

data:
  dataset_config: 05_data.yaml
  batch_size: 8
  eval_batch_size: 4
  num_workers: 4
  prefetch_factor: 4
  pin_memory: true
  subset:
    train: null
    val: null
    test: null

augmentation:
  # torchvision v2 (CPU DataLoader workers). At speed parity with Albumentations
  # after 2026-04-20 resize-first reorder; preferred for Mosaic/MixUp/CopyPaste
  # support and future GPU-aug path. See notebooks/detr_finetune_reference/CLAUDE.md.
  # HF Trainer does not run GPU augmentation regardless of library.
  library: torchvision
  normalize: false           # HF DFineImageProcessor handles normalization; feed [0,1]
  mosaic: false              # DETR-family doesn't use it
  mixup: false

  # Probability-gated transforms — `build_transforms` honours these keys
  # in BOTH library paths (torchvision v2 + Albumentations).
  perspective_p: 0.1
  fliplr: 0.5
  flipud: 0.0
  brightness_contrast_p: 0.3
  brightness: 0.1
  contrast: 0.1
  hsv_p: 0.1
  hsv_h: 0.015
  hsv_s: 0.3
  hsv_v: 0.3
  min_bbox_area: 4.0

  # Affine — aligned with rtdetr/yolox for fire/smoke generalization
  scale: [0.9, 1.1]
  degrees: 10.0
  translate: 0.1
  shear: 2.0

training:
  backend: hf                # HF Trainer — proven for D-FINE on CPPE-5 (test mAP 0.492)
  # Epochs: official Peterande/D-FINE base is 72; CPPE-5 reference uses 50.
  # Phase-B confirmed 40-ep with this recipe peaks ep39 at val mAP@0.5 = 0.5677
  # on 20%-fire (best of 3 recipe variants tested). `load_best_model_at_end`
  # rescues the best-checkpoint on any noisy late-epoch dip. For full-data
  # Phase D (clean dataset), bumped to 60 — DFL head keeps refining past ep40
  # on larger distributions; old leaked-data run peaked ep26-32, clean run may
  # peak later. patience=100 disables ES so full 60-ep run is guaranteed.
  epochs: 80
  optimizer: adamw
  # Layered AdamW matching official Peterande/D-FINE `configs/dfine/include/
  # optimizer.yml` — head (encoder/decoder) at 2.5e-4, backbone (HGNetv2) at
  # 2.5e-5 (10× lower). Our HF Trainer subclass (_DetectionTrainer.
  # create_optimizer) reads lr_backbone and splits params by "backbone" name.
  # Without the split, qubvel's blended 5e-5 was the safe fallback on CPPE-5.
  lr: 0.00025
  lr_backbone: 0.000025
  weight_decay: 0.000125     # official D-FINE optimizer.yml (norm groups get 0)
  warmup_steps: 500
  # constant_with_warmup approximates official MultiStepLR (flat after warmup,
  # gamma step only near end). Empirical: cosine (attempt v2) decayed too fast
  # on 20% data — LR dropped below effective level by ep10, peak only 0.328.
  # Flat LR + patience-driven early stop wins here.
  scheduler: constant_with_warmup
  max_grad_norm: 0.1         # official D-FINE clip_max_norm
  bf16: false                # MANDATORY for D-FINE — distribution-focused loss stalls
                             # val mAP at ~0.15 under bf16 (unlike RT-DETRv2 which is
                             # bf16-neutral). Keep fp32.
  amp: false                 # fp16 AMP overflows DETR decoder — NaN pred_boxes
  gpu_augment: false         # HF Trainer uses its own DataLoader
  # EMA is part of the official D-FINE recipe (decay 0.9999, 1000-step warmup).
  # Smooths the noisy DETR mAP trajectory; also what CPPE-5 reference uses by
  # default. `EMACallback` in hf_trainer.py handles swap-before-eval/save.
  ema: false
  ema_decay: 0.9999
  ema_warmup_steps: 1000
  # patience=100 effectively disables ES for D-FINE through all 60 epochs.
  # History: p15 fired at ep16, p35 would fire at ep36 — both before DFL breakthrough
  # (still oscillating at ep32, train loss declining, breakthrough expected ep33-45).
  # With max epochs=60, patience=100 guarantees the full run completes.
  patience: 30

  val_viz:
    enabled: true
    num_samples: 10
    conf_threshold: 0.01      # DETR sigmoid scores cap ~0.2
    grid_cols: 2
    balanced: true            # round-robin over fire/smoke buckets
  best_viz:
    enabled: true
    num_samples: 16
    conf_threshold: 0.01
  train_viz:
    enabled: true             # per-epoch GT-vs-pred grid on train split
    num_samples: 10
    conf_threshold: 0.01
    grid_cols: 2
    balanced: true
  data_viz:
    enabled: true
    splits: [train, val, test]
    num_samples: 16
    grid_cols: 4
  aug_viz:
    enabled: true
    splits: [train]
    num_samples: 16
    grid_cols: 4

  # NB: pytorch-backend-only keys removed (val_full_interval, val_subset_fraction,
  # grad_clip, ema_decay, warmup_epochs, patience-as-epochs). HF Trainer evals
  # every epoch by default.

loss:
  type: detr

logging:
  # report_to: none disables wandb + tensorboard. HF Trainer hard-fails on wandb
  # auth error if `wandb login` hasn't been run; tensorboard background writer
  # has also crashed on missing-subdir races. Keep off by default; flip to
  # "wandb" or ["wandb","tensorboard"] after `wandb login`.
  report_to: none
  save_dir: ../runs/dfine_s
  wandb_project: smart-camera
  # run_name omitted — HF Trainer (hf_trainer.py:736-740) uses run_name as the
  # feature folder for generate_run_dir(), so a stale value creates a ghost
  # `features/<run_name>/runs/...` tree. Dropping it makes HF fall back to
  # config_path.parent.parent.name = "safety-fire_detection" (what we want).

checkpoint:
  save_best: true
  metric: eval_map           # HF Trainer + torchmetrics key (was val/mAP50 under pytorch)
  mode: max
  save_interval: 1             # every epoch — prevents losing best checkpoint on crash

evaluation:
  score_threshold: 0.01

seed: 42
