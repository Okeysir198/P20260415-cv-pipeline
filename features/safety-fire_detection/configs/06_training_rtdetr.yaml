# Training config — Fire Detection (RT-DETRv2)
# License: Apache 2.0 (Baidu / Peking University)
#
# Variants (override via --override model.arch=<key>):
#   rtdetr-r18  — ResNet-18 backbone, ~20M params, fast inference   (DEFAULT)
#   rtdetr-r50  — ResNet-50 backbone, ~42M params, higher accuracy
#
# Pretrained weights downloaded from HuggingFace Hub on first run:
#   PekingU/rtdetr_v2_r18vd, PekingU/rtdetr_v2_r50vd
#
# Usage:
#   uv run core/p06_training/train.py --config features/safety-fire_detection/configs/06_training_rtdetr.yaml
#   uv run core/p06_training/train.py --config features/safety-fire_detection/configs/06_training_rtdetr.yaml \
#       --override model.arch=rtdetr-r50 training.epochs=300

model:
  arch: rtdetr-r18
  pretrained: PekingU/rtdetr_v2_r18vd
  num_classes: 2
  input_size: [640, 640]

data:
  dataset_config: 05_data.yaml
  batch_size: 32
  num_workers: 8
  prefetch_factor: 4
  pin_memory: true
  subset:                  # Limit each split independently (null = use all data)
    train: null            # int (N images), float (fraction 0.0–1.0), or null
    val: null              # Use for: quick code checks, experiments, progressive training
    test: null

augmentation:
  mosaic: false         # not supported for DETR-family models
  mixup: false
  contrast: 0.4         # GPU luma-contrast; fire/smoke are inherently low-contrast
  hsv_h: 0.015
  hsv_s: 0.5
  hsv_v: 0.4
  fliplr: 0.5
  flipud: 0.0
  scale: [0.8, 1.2]
  degrees: 10.0
  translate: 0.1
  shear: 2.0

training:
  backend: pytorch
  epochs: 150
  optimizer: adamw
  lr: 0.00016         # HPO best (trial 3, mAP50=0.1195 @ 5% data)
  weight_decay: 0.0000115
  warmup_epochs: 15
  scheduler: cosine
  patience: 30
  val_viz:
    enabled: true
    num_samples: 8
    conf_threshold: 0.05
    grid_cols: 2

  train_viz:
    enabled: true
    num_samples: 8
    conf_threshold: 0.05
    grid_cols: 2

  data_viz:                # Raw images + GT label grid (once before training)
    enabled: true
    splits: [train, val, test]
    num_samples: 16
    grid_cols: 4
    thickness: 2
    text_scale: 0.4
    dpi: 120

  aug_viz:                 # Augmented images + label grid (once before training)
    enabled: true
    splits: [train]
    num_samples: 16
    grid_cols: 4
    thickness: 2
    text_scale: 0.4
    dpi: 120

  val_full_interval: 5        # 0 = full val every epoch; N = full val every N epochs
  val_subset_fraction: 0.2   # fraction of val set for quick per-epoch val
  amp: false  # RT-DETRv2 decoder overflows in fp16 — keep fp32
  gpu_augment: true
  grad_clip: 0.1
  ema: false

loss:
  type: detr

logging:
  wandb_project: smart-camera
  run_name: fire_rtdetr_r18_v1

checkpoint:
  save_best: true
  metric: val/mAP50
  mode: max
  save_interval: 10

seed: 42
