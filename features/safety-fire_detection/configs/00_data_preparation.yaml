# Fire Detection — Data Preparation Config (v1, 2026-04-15)
#
# Quality-first selection: 3 clean, diverse sources. fasdd_cv (95K) and
# roboflow_fire_seg (seg masks) are deferred to v2; site_collected stays
# as optional overlay when populated.

task: detection
dataset_name: "fire_detection"
output_dir: "../../../dataset_store/training_ready/fire_detection"
output_format: "yolo"

# Canonical target classes
classes:
  - fire
  - smoke

sources:
  # Primary — paper-authored D-Fire, 21,527 imgs, clean YOLO labels
  - name: "d_fire"
    path: "../../../dataset_store/raw/fire_detection/d_fire/data"
    format: "yolo"
    has_splits: true
    splits_to_use: ["train", "val", "test"]
    license: "CC-BY-4.0"
    notes: "Primary — paper-authored D-Fire dataset"
    # data.yaml lives at d_fire/ (parent of data/), not at d_fire/data/ (data_root).
    # Provide source_classes explicitly so the YOLO parser resolves numeric IDs correctly.
    # D-Fire order: 0=smoke, 1=fire (per data.yaml names: ['smoke', 'fire'])
    source_classes: ["smoke", "fire"]
    class_map:
      "smoke": "smoke"
      "fire": "fire"

  # Indoor diversity — Zenodo 15826133, 10,000 imgs. Roboflow YOLO with
  # numeric class names (0=fire, 1=smoke per the indoor-fire-smoke project)
  - name: "zenodo_indoor_fire"
    path: "../../../dataset_store/raw/fire_detection/zenodo_indoor_fire/Indoor Fire Smoke"
    format: "yolo"
    has_splits: true
    splits_to_use: ["train", "valid", "test"]
    license: "CC-BY-4.0"
    notes: "Indoor fire/smoke diversity"
    class_map:
      "0": "fire"
      "1": "smoke"

  # Factory context — critical for Nitto domain; 1,343 imgs
  # (also has chemical/no-helmet/water-leak classes we discard here)
  - name: "industrial_hazards"
    path: "../../../dataset_store/raw/fire_detection/industrial_hazards"
    format: "yolo"
    has_splits: true
    splits_to_use: ["train", "valid"]
    license: "CC-BY-4.0"
    notes: "Factory context — critical for Nitto deployment domain"
    dropped_classes: ["chemical", "no-helmet", "water-leak"]
    class_map:
      "fire": "fire"
      "smoke": "smoke"

  # Site-collected overlay (populated on-site, may be empty)
  - name: "site_collected"
    path: "../../../dataset_store/site_collected/fire_detection"
    format: "yolo"
    has_splits: false
    optional: true
    license: "internal"
    notes: "Nitto on-site footage — populate for domain adaptation"
    class_map:
      "fire": "fire"
      "smoke": "smoke"

splits:
  train: 0.8
  val: 0.1
  test: 0.1
  seed: 42

options:
  copy_images: true
  handle_duplicates: "rename"
  validate_labels: true

# Datasets intentionally excluded from v1 — add in v2 when needed
held_back:
  - name: "fasdd_cv"
    reason: "COCO→YOLO conversion overhead + near-duplicates (95K imgs)"
    when: "If domain-gap at test time; run fasdd_cv COCO→YOLO converter first"
  - name: "roboflow_fire_seg"
    reason: "Segmentation masks reserved for p03 generative augmentation"
    when: "When p03 gen-aug pipeline is active"
