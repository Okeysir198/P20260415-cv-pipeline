# Training config — Fire Detection (YOLOX)
# License: Apache 2.0 (Megvii)
#
# Variants (override via --override model.arch=<key>):
#   yolox-s   — 2.5M params, fastest inference
#   yolox-m   — 8.9M params, best accuracy-speed tradeoff  (DEFAULT)
#   yolox-l   — 46.5M params, highest accuracy, slower
#
# Usage:
#   uv run core/p06_training/train.py --config features/safety-fire_detection/configs/06_training_yolox.yaml
#   uv run core/p06_training/train.py --config features/safety-fire_detection/configs/06_training_yolox.yaml \
#       --override model.arch=yolox-s training.epochs=300

model:
  arch: yolox-m
  pretrained: ../../../pretrained/yolox_m.pth
  num_classes: 2
  input_size: [640, 640]
  depth: 0.67
  width: 0.75

data:
  dataset_config: 05_data.yaml
  batch_size: 16
  num_workers: 8
  pin_memory: true
  subset:                  # Limit each split independently (null = use all data)
    train: null            # int (N images), float (fraction 0.0–1.0), or null
    val: null              # Use for: quick code checks, experiments, progressive training
    test: null

augmentation:
  mosaic: true          # YOLOX-specific; keep true for scale/context diversity
  mixup: false
  contrast: 0.4         # GPU luma-contrast; fire/smoke are inherently low-contrast
  hsv_h: 0.015
  hsv_s: 0.5
  hsv_v: 0.4
  fliplr: 0.5
  flipud: 0.0
  scale: [0.8, 1.2]
  degrees: 10.0
  translate: 0.1
  shear: 2.0

training:
  backend: pytorch
  epochs: 200
  optimizer: sgd
  lr: 0.01
  momentum: 0.9
  weight_decay: 0.0005
  warmup_epochs: 5
  scheduler: cosine
  patience: 50
  val_viz:
    enabled: true
    num_samples: 12       # images sampled from val set (fixed across epochs)
    conf_threshold: 0.25  # min score to show a prediction box
    grid_cols: 2          # columns; rows computed from num_samples / grid_cols
    gt_color_rgb: [160, 32, 240]   # GT box color (R,G,B) — purple
    pred_color_rgb: [0, 200, 0]   # prediction box color (R,G,B) — green
    gt_thickness: 2               # GT box line width
    pred_thickness: 1             # prediction box line width (drawn on top)
    text_scale: 0.4               # label font scale
    dpi: 150                      # output image DPI

  data_viz:                # Raw images + GT label grid (once before training)
    enabled: true
    splits: [train, val, test]
    num_samples: 16
    grid_cols: 4
    thickness: 2
    text_scale: 0.4
    dpi: 120

  aug_viz:                 # Augmented images + label grid (once before training)
    enabled: true
    splits: [train]
    num_samples: 16
    grid_cols: 4
    thickness: 2
    text_scale: 0.4
    dpi: 120

  val_full_interval: 5        # 0 = full val every epoch; N = full val every N epochs
  val_subset_fraction: 0.2   # fraction of val set for quick per-epoch val
  amp: true
  grad_clip: 35.0
  ema: true
  ema_decay: 0.9998

loss:
  type: yolox

logging:
  wandb_project: smart-camera
  run_name: fire_yoloxm_v1

checkpoint:
  save_best: true
  metric: val/mAP50
  mode: max
  save_interval: 10

seed: 42
