# Dataset config — Fall Detection
dataset_name: "fall_detection"
path: "../../../dataset_store/training_ready/fall_detection"
train: "train/images"
val: "val/images"
test: "test/images"

names:
  0: person
  1: fallen_person
num_classes: 2
input_size: [640, 640]

# Normalization (ImageNet defaults, updated by compute_normalization.py)
mean: [0.485, 0.456, 0.406]
std: [0.229, 0.224, 0.225]

# SAM3-friendly text prompts for auto-annotation
text_prompts:
  person: "a person standing, walking, or sitting upright"
  fallen_person: "a person lying on the ground, fallen down, collapsed on the floor"
