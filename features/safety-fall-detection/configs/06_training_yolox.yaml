# Training config — Fall Detection (YOLOX-M, official Megvii impl)
# License: Apache 2.0 (Megvii)
#
# Recipe aligned with notebooks/detr_finetune_reference/our_yolox_torchvision/.
# MixUp DISABLED across all YOLOX configs (user preference — Mosaic-only
# regularization; MixUp's alpha-blend can blur the crisp upright-vs-fallen
# geometric signal on this feature especially).
#
# Scale tightened to [0.8, 1.2] to preserve person proportions (aggressive
# scale jitter can shift the upright-vs-fallen distinction).
#
# Variants (override via --override model.arch=<key>):
#   yolox-s (~2.5M) | yolox-m (~8.9M, DEFAULT) | yolox-l (~46.5M)
#
# Run:
#   CUDA_VISIBLE_DEVICES=0 .venv-yolox-official/bin/python core/p06_training/train.py \
#     --config features/safety-fall-detection/configs/06_training_yolox.yaml

model:
  arch: yolox-m
  impl: official
  pretrained: ../../../pretrained/yolox_m.pth
  num_classes: 2
  input_size: [640, 640]
  depth: 0.67
  width: 0.75

data:
  dataset_config: 05_data.yaml
  batch_size: 16
  num_workers: 4
  prefetch_factor: 4
  pin_memory: true
  subset:
    train: null
    val: null
    test: null

augmentation:
  library: torchvision
  normalize: false
  mosaic: true
  mixup: false
  hsv_h: 0.015
  hsv_s: 0.5
  hsv_v: 0.4
  fliplr: 0.5                # horizontal flip safe (left/right fall)
  flipud: 0.0                # MANDATORY — vertical flip destroys upright-vs-fallen signal
  scale: [0.8, 1.2]
  degrees: 10.0
  translate: 0.1
  shear: 2.0

training:
  backend: pytorch
  epochs: 100
  optimizer: sgd
  lr: 0.0025                 # Megvii: 0.01 × bs/64
  momentum: 0.9
  weight_decay: 0.0005
  warmup_epochs: 5
  scheduler: cosine
  patience: 40
  val_full_interval: 0
  val_subset_fraction: 1.0
  amp: true
  grad_clip: 35.0
  ema: true
  ema_decay: 0.9998
  gpu_augment: false

  val_viz:
    enabled: true
    num_samples: 12
    conf_threshold: 0.25
    grid_cols: 2
    gt_color_rgb: [160, 32, 240]
    pred_color_rgb: [0, 200, 0]
    gt_thickness: 2
    pred_thickness: 1
    text_scale: 0.4
    dpi: 150

  data_viz:
    enabled: true
    splits: [train, val, test]
    num_samples: 16
    grid_cols: 4
    thickness: 2
    text_scale: 0.4
    dpi: 120

  aug_viz:
    enabled: true
    splits: [train]
    num_samples: 16
    grid_cols: 4
    thickness: 2
    text_scale: 0.4
    dpi: 120

loss:
  type: yolox

logging:
  wandb_project: smart-camera

checkpoint:
  save_best: true
  metric: val/mAP50
  mode: max
  save_interval: 10

seed: 42
