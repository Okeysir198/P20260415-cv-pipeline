# Training config — Phone Usage Detection (D-FINE, HF Trainer backend)
# License: Apache 2.0 (USTC / DEIM)
#
# Recipe aligned with notebooks/detr_finetune_reference/our_dfine_torchvision/
# — HF Trainer + torchvision v2 (the validated-on-CPPE-5 path). See the fire
# D-FINE config for the full rationale on moving off the pytorch backend.
#
# Phone-usage notes:
# - 2 classes, EXTREME 94.6/5.4 imbalance (phone_usage dominates, person rare).
# - D-FINE has the HIGHEST class-collapse risk on this feature per the 2-class
#   fine-tune precedent (root CLAUDE.md gotcha). If `person` AP = 0 while
#   `phone_usage` AP > 0 during Phase B, mark arch as FAIL regardless of mAP.
# - Phone bboxes are tiny (phone area only) — keep `input_size: [640, 640]`.
#
# Variants (override via --override model.arch=<key>):
#   dfine-n | dfine-s (DEFAULT) | dfine-m | dfine-large

model:
  arch: dfine-m
  pretrained: ustc-community/dfine_m_coco
  num_classes: 2
  input_size: [640, 640]

data:
  dataset_config: 05_data.yaml
  batch_size: 8
  eval_batch_size: 4         # capped to avoid OOM during HF/pytorch eval (val + final test)
  num_workers: 4
  prefetch_factor: 4
  pin_memory: true
  subset:
    train: null
    val: null
    test: null

augmentation:
  library: torchvision
  normalize: false
  mosaic: false
  mixup: false

  perspective_p: 0.1
  fliplr: 0.5
  brightness_contrast_p: 0.5
  hsv_p: 0.1
  hsv_h: 0.015
  hsv_s: 0.5
  hsv_v: 0.4

  scale: [1.0, 1.0]
  degrees: 0.0
  translate: 0.0
  shear: 0.0

training:
  backend: hf
  epochs: 50
  optimizer: adamw
  lr: 0.00005
  weight_decay: 0.0
  warmup_steps: 300
  scheduler: linear
  max_grad_norm: 0.1
  bf16: false                # MANDATORY for D-FINE
  amp: false
  gpu_augment: false
  ema: false
  patience: 50

  val_viz:
    enabled: true
    num_samples: 8
    conf_threshold: 0.05
    grid_cols: 2
  train_viz:
    enabled: false
  data_viz:
    enabled: true
    splits: [train, val, test]
    num_samples: 16
    grid_cols: 4
  aug_viz:
    enabled: true
    splits: [train]
    num_samples: 16
    grid_cols: 4

loss:
  type: detr

logging:
  report_to: none
  wandb_project: smart-camera

checkpoint:
  save_best: true
  metric: eval_map
  mode: max
  save_interval: 10

seed: 42
