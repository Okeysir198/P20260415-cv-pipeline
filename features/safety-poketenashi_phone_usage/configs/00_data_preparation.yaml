# Poketenashi Phone Usage — Data Preparation Config (v1, 2026-04-15)
#
# Phase 1 Model H sub-model: detect `phone_usage` (using mobile phone while walking).
# Only phone_usage is detection-trained; hands_in_pockets + no_handrail + unsafe_stair_crossing
# are derived from pose/zone logic in the inference pipeline, not this model.
#
# Canonical classes: person, phone_usage
# person comes from shlokraval_ppe_yolov8 (44k person labels).
# phone_usage comes from 5 phone-detection sources totaling ~13K imgs.

task: detection
dataset_name: "safety_poketenashi_phone_usage"
output_dir: "../../../dataset_store/training_ready/safety_poketenashi_phone_usage"
output_format: "yolo"

classes:
  - person
  - phone_usage

sources:
  # Primary — explicit "Using Phone" + "mobile" labels, 3748 imgs
  - name: "rf_using_phone_unimonitor"
    path: "../../../dataset_store/raw/phone_detection/rf_using_phone_unimonitor"
    format: "yolo"
    has_splits: true
    splits_to_use: ["train", "valid", "test"]
    license: "CC-BY-4.0"
    notes: "Explicit phone-usage action labels (Using Phone + mobile), 3,748 imgs"
    class_map:
      "Using Phone": "phone_usage"
      "mobile": "phone_usage"

  # 4216 imgs, Phone object in person-using-phone context
  - name: "rf_phone_using_fyp"
    path: "../../../dataset_store/raw/phone_detection/rf_phone_using_fyp"
    format: "yolo"
    has_splits: true
    splits_to_use: ["train", "valid", "test"]
    license: "CC-BY-4.0"
    notes: "Phone object in person-using-phone context, 4,216 imgs"
    class_map:
      "Phone": "phone_usage"

  # 3193 imgs, has `using phone` class; opaque v9 class is dropped
  - name: "rf_phone_texting_4class"
    path: "../../../dataset_store/raw/phone_detection/rf_phone_texting_4class"
    format: "yolo"
    has_splits: true
    splits_to_use: ["train", "valid", "test"]
    license: "CC-BY-4.0"
    notes: "Texting + calling action labels, 3,193 imgs"
    dropped_classes: ["mobile_dataset - v9 2025-04-05 7-31pm"]
    class_map:
      "using phone": "phone_usage"

  # Action-level Texting + Calling → phone_usage; Drinking dropped
  - name: "rf_texting_calling_drinking"
    path: "../../../dataset_store/raw/phone_detection/rf_texting_calling_drinking"
    format: "yolo"
    has_splits: true
    splits_to_use: ["train", "valid"]
    license: "CC-BY-4.0"
    notes: "Texting/Calling action classes only; Drinking excluded"
    dropped_classes: ["c2-Drinking"]
    class_map:
      "c0-Texting": "phone_usage"
      "c1-Calling": "phone_usage"

  # FPI-Det — 22,879 imgs, face+phone paired labels. License: AGPL-3.0.
  # Every frame has a person-using-phone by design, so `phone` bbox → phone_usage.
  - name: "fpi_det"
    path: "../../../dataset_store/raw/phone_detection/fpi_det/reorganized_dataset"
    format: "yolo"
    has_splits: true
    splits_to_use: ["train", "val", "test"]
    source_classes: ["phone", "face"]
    license: "AGPL-3.0"
    notes: "Face+phone paired labels — every frame is person-using-phone (22,879 imgs). AGPL license."
    dropped_classes: ["face"]
    class_map:
      "phone": "phone_usage"

  # 997 imgs, explicit "phone usage" class
  - name: "roboflow_phone_usage_dms"
    path: "../../../dataset_store/raw/phone_detection/roboflow_phone_usage_dms"
    format: "yolo"
    has_splits: true
    splits_to_use: ["train", "valid", "test"]
    license: "CC-BY-4.0"
    notes: "DMS-context phone usage detection, 997 imgs"
    class_map:
      "phone usage": "phone_usage"

  # Person class — reuse shlokraval (44k Person labels, high coverage)
  - name: "shlokraval_ppe_yolov8"
    path: "../../../dataset_store/raw/helmet_detection/shlokraval_ppe_yolov8"
    format: "yolo"
    has_splits: true
    splits_to_use: ["train", "valid", "test"]
    license: "Apache-2.0"
    notes: "Person class source only — 44K Person labels from PPE dataset (all other PPE classes dropped)"
    dropped_classes: ["Hardhat", "NO-Hardhat", "Gloves", "Goggles", "Mask", "Vest", "Fall-Detected", "Ladder", "Safety Cone", "Machinery", "Vehicle", "NO-Safety Vest", "NO-Mask", "NO-Gloves"]
    class_map:
      "Person": "person"

  # Site-collected overlay (optional)
  - name: "site_collected"
    path: "../../../dataset_store/site_collected/phone_detection"
    format: "yolo"
    has_splits: false
    optional: true
    license: "internal"
    notes: "Nitto site footage — workers using phones in factory corridors"
    class_map:
      "person": "person"
      "phone_usage": "phone_usage"

splits:
  train: 0.8
  val: 0.1
  test: 0.1
  seed: 42

options:
  copy_images: true
  handle_duplicates: "rename"
  validate_labels: true

# Datasets intentionally excluded from v1 — add in v2 when needed
held_back:
  - name: "roboflow_mobile_phone_ineuron"
    reason: "Cell phone object only (not usage action) — wrong taxonomy for this model"
    when: "If a separate cell-phone-object detection model is needed"
  - name: "phone_call_usage"
    reason: "Opaque class name 'phone-person - v1...' — class semantics unclear"
    when: "If class mapping is clarified by dataset owner"
  - name: "state_farm_distracted"
    reason: "Kaggle competition — requires rules acceptance before download"
    when: "After accepting Kaggle competition terms"
