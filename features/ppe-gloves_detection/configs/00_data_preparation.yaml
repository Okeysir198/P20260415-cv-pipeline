# Gloves Detection — Data Preparation Config (v0 smoke, 2026-04-15)
#
# Minimal 100-sample smoke test to validate the p00 → p02 → p01 → p02 pipeline.
# Single-class: hand_with_glove (positive only). Expand to 3-class in v1
# once smoke test passes.
#
# Source: rf_hand_gloves test split only (103 imgs) — pre-split YOLO, clean labels.
# Dropped (v1 candidates): rf_hand_gloves train+valid (842 more imgs),
# datacluster_gloves (236, VOC), keremberke_ppe glove+no_glove (8257 anns),
# shlokraval_ppe_yolov8 Gloves+NO-Gloves (large), rf_chemical_ppe_11class,
# rf_siabar_ppe, sh17_ppe gloves, roboflow_ppe_6class.

task: detection
dataset_name: "ppe_gloves_detection"
output_dir: "../../../dataset_store/training_ready/ppe_gloves_detection"
output_format: "yolo"

classes:
  - hand_with_glove

sources:
  # rf_hand_gloves test split only — 103 imgs, 1-class HAND-GLOVES
  - name: "rf_hand_gloves_test"
    path: "../../../dataset_store/raw/glove_detection/rf_hand_gloves"
    format: "yolo"
    has_splits: true
    splits_to_use: ["test"]
    class_map:
      "HAND-GLOVES": "hand_with_glove"

splits:
  train: 0.8
  val: 0.1
  test: 0.1
  seed: 42

options:
  copy_images: true
  handle_duplicates: "rename"
  validate_labels: true
