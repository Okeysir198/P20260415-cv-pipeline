name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Check formatting
        run: uv run ruff format --check .
      - name: Check linting
        run: uv run ruff check core/ tools/ utils/ tests/

  test-utils:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --extra dev --extra train
      - name: Run utils tests
        run: uv run pytest tests/test_utils00_config_device_metrics.py -v --tb=short

  test-core:
    needs: test-utils
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --extra dev --extra train
      - name: Create test dataset
        run: uv run python tests/create_test_dataset.py
      - name: Run data tests
        run: uv run pytest tests/test_core00_create_data.py tests/test_core01_data_transforms.py -v --tb=short
