# Raw pipeline integration test config.
# Dataset is created at runtime by test_p12_raw_pipeline.py:
#   - copies images from test_fire_100 (strips labels)
#   - runs auto-annotation to generate YOLO labels
# Path resolves relative to configs/_test/ → project_root/outputs/test_raw_pipeline
dataset_name: "test_raw_pipeline"
path: "../../outputs/test_raw_pipeline"
train: "train/images"
val:   "val/images"
test:  "val/images"

names:
  0: fire
  1: smoke
num_classes: 2
input_size: [640, 640]

mean: [0.485, 0.456, 0.406]
std:  [0.229, 0.224, 0.225]

text_prompts:
  fire:  "fire, flames, burning fire"
  smoke: "smoke, dark smoke cloud"
