# Dataset config — Shoes Detection (100 images for pipeline testing)
dataset_name: "test_shoes_detection_100"
path: "../../dataset_store/test_shoes_detection_100"
train: "train/images"
val: "val/images"
test: "val/images"

names:
  0: person
  1: foot_with_safety_shoes
  2: foot_without_safety_shoes
num_classes: 3
input_size: [640, 640]

mean: [0.485, 0.456, 0.406]
std: [0.229, 0.224, 0.225]

text_prompts:
  person: "a person standing or walking, full body visible"
  foot_with_safety_shoes: "a person's feet wearing safety boots or steel-toe shoes"
  foot_without_safety_shoes: "a person's feet wearing regular shoes, sneakers, sandals, or barefoot"

# Rule-based auto-labeling: detect intermediate objects, derive final classes via IoU overlap
auto_label:
  detection_classes:
    person: "a person standing or walking, full body visible"
    foot: "a person's foot, ankle area, shoe region near the ground"
    safety_shoe: "safety boots, steel-toe shoes, industrial protective footwear"
  class_rules:
    - { output_class_id: 0, source: person, condition: direct }
    - { output_class_id: 1, source: foot, condition: overlap, target: safety_shoe, min_iou: 0.3 }
    - { output_class_id: 2, source: foot, condition: no_overlap, target: safety_shoe, min_iou: 0.3 }
  vlm_verify:
    enabled: true
    model: "qwen3.5:9b"
    verify_classes: [1, 2]
    priority:
      low_confidence_threshold: 0.5
      small_box_threshold: 0.02
      prioritize_derived: true
    budget:
      sample_rate: 0.10
      max_samples: 100
