# Dataset config — PPE Detection (100 helmet images for pipeline testing)
dataset_name: "test_ppe_100"
path: "../../dataset_store/test_ppe_100"
train: "train/images"
val: "val/images"
test: "val/images"

names:
  0: person
  1: head_with_helmet
  2: head_without_helmet
num_classes: 3
input_size: [640, 640]

# Normalization (ImageNet defaults)
mean: [0.485, 0.456, 0.406]
std: [0.229, 0.224, 0.225]

# SAM3-friendly text prompts (used when auto_label is absent)
text_prompts:
  person: "a person standing, walking, or working at a construction site"
  head_with_helmet: "a person's head wearing a hard hat or safety helmet"
  head_without_helmet: "a person's bare head, uncovered head, head with hair visible, no helmet"

# Rule-based auto-labeling: detect intermediate objects, derive final classes via IoU overlap
auto_label:
  detection_classes:
    person: "a person standing, walking, or working at a construction site"
    head: "a person's head, face, top of head"
    helmet: "a hard hat, safety helmet, construction helmet on a person's head"
  class_rules:
    - { output_class_id: 0, source: person, condition: direct }
    - { output_class_id: 1, source: head, condition: overlap, target: helmet, min_iou: 0.3 }
    - { output_class_id: 2, source: head, condition: no_overlap, target: helmet, min_iou: 0.3 }
  vlm_verify:
    enabled: true
    model: "qwen3.5:9b"
    ollama_url: "http://localhost:11434"
    verify_classes: [1, 2]
    priority:
      low_confidence_threshold: 0.5   # detections below this score get higher priority
      small_box_threshold: 0.02       # boxes with area < 2% of image get higher priority
      prioritize_derived: true        # overlap/no_overlap classes get higher priority
    budget:
      sample_rate: 0.10               # verify up to 10% of total detections
      max_samples: 100                # hard cap on VLM calls per pipeline run
    crop_padding: 0.15
    request_timeout: 30
    vlm_min_confidence: 0.7           # VLM must be >= 70% confident to reject a detection
