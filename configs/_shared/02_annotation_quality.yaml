# Annotation QA config
qa:
  splits: ["train", "val"]

sampling:
  strategy: "stratified"       # "stratified" | "random" | "all"
  sample_size: 2000            # Per split
  min_per_class: 100
  seed: 42

processing:
  batch_size: 32
  num_workers: 4

sam3:
  service_url: "http://localhost:18100"
  timeout: 120
  max_retries: 1        # retry once on timeout/connection error
  retry_delay_s: 2.0    # seconds between retries
  box_prompt_threshold: 0.5
  text_verify_threshold: 0.6
  # Auto-mask "missing detection" finds EVERY object in the scene, not just target
  # classes. Enable only for datasets where every visible object should be labeled
  # (e.g. COCO-style). For class-restricted datasets (fire/smoke only, helmet-only),
  # set to false to avoid false-positive "missing annotation" flags on unrelated scene objects.
  include_missing_detection: false
  auto_mask_sample_rate: 0.1
  auto_mask_min_area: 0.001
  auto_mask_max_area: 0.8

qa_service:
  url: "http://localhost:18105"
  timeout: 120

scoring:
  weights:
    structural: 0.3
    bbox_quality: 0.4
    classification: 0.2
    coverage: 0.1
  thresholds:
    good: 0.8
    review: 0.5

validation:
  max_coord_value: 1.0
  min_box_size: 0.005
  max_box_size: 0.95
  duplicate_iou_threshold: 0.95
  max_aspect_ratio: 20.0

reporting:
  worst_images_count: 50
  visualize_count: 20
  save_fixes: true

# text_prompts intentionally omitted here — each feature defines its own
# SAM3-friendly prompts in `features/<name>/configs/05_data.yaml::text_prompts:`.
# This keeps the shared QA config free of use-case names.
